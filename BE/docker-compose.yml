services:
  db:
    image: mysql:8.0.46
    container_name: evidence_pilot_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT_HOST:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data_refactor:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - evidence-network

  vector-db:
    image: qdrant/qdrant:latest
    container_name: evidence_pilot_qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_PORT_HOST:-6333}:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      evidence-network:
        aliases:
          - qdrant

  qdrant-init:
    image: curlimages/curl:latest
    container_name: evidence_pilot_qdrant_init
    depends_on:
      vector-db:
        condition: service_started
    networks:
      - evidence-network
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Qdrant...';
        until curl -sf http://qdrant:6333/readyz; do 
          sleep 2; 
        done;
        echo 'Qdrant ready. Creating collection...';
        curl -X PUT http://qdrant:6333/collections/source_chunks -H 'Content-Type: application/json' -d '{\"vectors\":{\"dense\":{\"size\":768,\"distance\":\"Cosine\"}},\"sparse_vectors\":{\"sparse\":{\"modifier\":\"idf\"}}}' && echo 'Collection created by qdrant-init' || echo 'Collection may already exist (ignore 409)';
        echo 'Qdrant initialization complete';
      "

  minio:
    image: minio/minio:latest
    container_name: evidence_pilot_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - evidence-network

  minio-init:
    image: minio/mc:latest
    container_name: evidence_pilot_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc alias set myminio $${MINIO_URL} $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}) do echo 'Waiting for MinIO...'; sleep 2; done; /usr/bin/mc mb --ignore-existing myminio/$${MINIO_BUCKET_NAME}; /usr/bin/mc anonymous set none myminio/$${MINIO_BUCKET_NAME}; echo 'Bucket created and configured'; "
    environment:
      MINIO_URL: ${MINIO_URL}
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    networks:
      - evidence-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: evidence_pilot_rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VIRTUAL_HOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - evidence-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MAVEN_SKIP_TESTS=true
    container_name: evidence_pilot_be
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT_HOST:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      vector-db:
        condition: service_started
      qdrant-init:
        condition: service_started
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # ── Database (internal Docker network — use service name, NOT host port) ──
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      # ── Qdrant (internal Docker network) ─────────────────────────────────────
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      # ── MinIO ────────────────────────────────────────────────────────────────
      MINIO_URL: ${MINIO_URL}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-${MINIO_URL}}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}

      # ── RabbitMQ ─────────────────────────────────────────────────────────────
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      # ── AI Model (from .env) ─────────────────────────────────────────────────
      AI_MODEL_BASE_URL: ${AI_MODEL_BASE_URL}
      AI_MODEL_API_KEY: ${AI_MODEL_API_KEY:-}
      AI_MODEL_READ_TIMEOUT_SECONDS: ${AI_MODEL_READ_TIMEOUT_SECONDS}

      # ── Admin seed (from .env) ──────────────────────────────────────────────
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      STUDENT_EMAIL: ${STUDENT_EMAIL}
      STUDENT_PASSWORD: ${STUDENT_PASSWORD}
      INSTRUCTOR_EMAIL: ${INSTRUCTOR_EMAIL}
      INSTRUCTOR_PASSWORD: ${INSTRUCTOR_PASSWORD}

      EMAIL_VERIFICATION_URL: ${EMAIL_VERIFICATION_URL:-}
      EMAIL_VERIFICATION_TOKEN_TTL_HOURS: ${EMAIL_VERIFICATION_TOKEN_TTL_HOURS:-24}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      SERVER_PORT: 8080
    networks:
      - evidence-network

networks:
  evidence-network:
    driver: bridge

volumes:
  db_data_refactor:
  qdrant_data:
  minio_data:
  rabbitmq_data:
